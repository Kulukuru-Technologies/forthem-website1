<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <!-- Email capture form for Netlify to detect -->
    <form name="email-capture" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="email" name="email" />
    </form>
    
    <!-- Contact form for Netlify to detect (used for full details submission) -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="mobile" />
      <select name="age_bracket"></select>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
